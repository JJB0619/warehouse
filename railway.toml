[build]
# 构建脚本，升级工具+安装依赖
command = "sh build.sh"

[deploy]
# 生产环境启动命令（核心！解决无响应问题）
# 绑定0.0.0.0和Railway分配的$PORT，使用Gunicorn多worker启动
startCommand = "gunicorn app:app -b 0.0.0.0:$PORT -w 4 --timeout 120"

[env]
# 强制Python输出实时日志，方便排查问题
PYTHONUNBUFFERED = "1"
# 禁用pip缓存，避免缓存导致的依赖问题
PIP_NO_CACHE_DIR = "1"
# Flask生产环境配置
FLASK_APP = "app.py"
FLASK_ENV = "production"