<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>库存报表</title>
<style>
body{padding:20px;background:#f5f5f5;font-family:微软雅黑}
.btn{background:#007bff;color:white;padding:8px 15px;border-radius:5px;margin-right:10px;text-decoration:none}
table{width:100%;border-collapse:collapse;background:white}
table,td,th{border:1px solid #000;padding:8px}
.total{font-weight:bold;background:#ffd}
</style>
<script>function printReport(){window.print()}</script>
</head>
<body>
<h2>库存报表</h2>
<a href="/" class="btn">返回</a>
<button onclick="printReport()" class="btn">打印报表</button>
<a href="/export_excel" class="btn">导出 Excel</a>

<table>
<tr><th>ID</th><th>商品名称</th><th>型号</th><th>大厅</th><th>二楼</th><th>三楼</th><th>总库存</th></tr>
{% for d in data %}
<tr>
<td>{{ d[0] }}</td>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td>{{ d[3] }}</td>
<td>{{ d[4] }}</td>
<td>{{ d[5] }}</td>
<td>{{ d[3]+d[4]+d[5] }}</td>
</tr>
{% endfor %}
<tr class="total">
<td colspan="3">合计</td>
<td>{{ total_hall }}</td>
<td>{{ total_f2 }}</td>
<td>{{ total_f3 }}</td>
<td>{{ total_all }}</td>
</tr>
</table>
</body></html>
