<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>出入库管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h3>菜单</h3>
        <a href="/index">控制台</a>
        <a href="/products">商品管理</a>
        <a href="/stock">出入库</a>
        <a href="/transfer">仓库调拨</a>
        <a href="/warning">库存预警</a>
        <a href="/report">报表导出</a>
        <a onclick="logout()">退出登录</a>
    </div>

    <div class="content">
        <h1>入库 / 出库</h1>
        <div class="panel">
            <h3>入库</h3>
            <select id="in_pid"></select>
            <input id="in_qty" type="number" placeholder="数量">
            <button onclick="stockIn()">确认入库</button>
        </div>
        <div class="panel">
            <h3>出库</h3>
            <select id="out_pid"></select>
            <input id="out_qty" type="number" placeholder="数量">
            <button onclick="stockOut()">确认出库</button>
        </div>
    </div>
</div>

<script src="/static/js/main.js"></script>
</body>
</html>
