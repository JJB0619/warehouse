<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>出入库管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-title">菜单</div>
      <div class="sidebar-menu">
        <a href="/index">控制台</a>
        <a href="/products">商品管理</a>
        <a href="/stock" class="active">出入库管理</a>
        <a href="/transfer">仓库调拨</a>
        <a href="/warning">库存预警</a>
        <a href="/report">报表导出</a>
        <a href="/users">用户管理</a>
        <a href="javascript:logout()">退出</a>
      </div>
    </div>

    <div class="content">
      <div class="page-title">入库 / 出库</div>
      <div class="panel">
        <div class="card-title">入库</div>
        <div class="form-row">
          <select id="in_pid"></select>
          <input id="in_qty" type="number" placeholder="入库数量">
          <button class="btn-primary" onclick="stockIn()">确认入库</button>
        </div>
      </div>
      <div class="panel">
        <div class="card-title">出库</div>
        <div class="form-row">
          <select id="out_pid"></select>
          <input id="out_qty" type="number" placeholder="出库数量">
          <button class="btn-primary" onclick="stockOut()">确认出库</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/js/main.js"></script>
</body>
</html>
