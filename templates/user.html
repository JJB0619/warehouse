<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>用户管理</title>
<style>
body{padding:20px;background:#f5f5f5}
</style>
</head>
<body>
<h2>子管理员 & 权限</h2>
<a href="/">返回</a>
<h3>添加账号</h3>
<form method="post" action="/add_user">
<input name="username" placeholder="账号" required>
<input name="password" placeholder="密码" required>
<label><input type="checkbox" name="hall" value="1"> 大厅</label>
<label><input type="checkbox" name="f2" value="1"> 二楼</label>
<label><input type="checkbox" name="f3" value="1"> 三楼</label>
<button>添加</button>
</form>

<h3>账号列表</h3>
<table border="1">
<tr><th>账号</th><th>大厅</th><th>二楼</th><th>三楼</th></tr>
{% for u in users %}
<tr><td>{{ u[1] }}</td><td>{{ u[3] }}</td><td>{{ u[4] }}</td><td>{{ u[5] }}</td></tr>
{% endfor %}
</table>
</body></html>
