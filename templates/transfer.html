<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>调拨</title>
<style>
body{padding:20px;background:#f5f5f5}
a{color:#007bff}
table{border-collapse:collapse;background:white;width:100%}
td,th{border:1px solid #ccc;padding:8px}
</style>
</head>
<body>
<h2>仓库调拨</h2>
<a href="/">返回</a>
<table>
<tr><th>商品</th><th>从</th><th>到</th><th>数量</th><th>操作</th></tr>
{% for p in products %}
<tr>
<td>{{ p[1] }}</td>
<form method="post">
<input type="hidden" name="pid" value="{{ p[0] }}">
<td>
<select name="from_loc">
<option value="hall">大厅</option>
<option value="f2">二楼</option>
<option value="f3">三楼</option>
</select>
</td>
<td>
<select name="to_loc">
<option value="hall">大厅</option>
<option value="f2">二楼</option>
<option value="f3">三楼</option>
</select>
</td>
<td><input type="number" name="num" min="1" value="1"></td>
<td><button>调拨</button></td>
</form>
</tr>
{% endfor %}
</table>
</body></html>
