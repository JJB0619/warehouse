{% extends "base.html" %}
{% block content %}
<h5>仓库调拨</h5>
<a href="/export/transfer" class="btn btn-success btn-sm mb-2">导出Excel</a><hr>
<div class="card p-3 mb-3">
<form method="post" action="/transfer/add" class="row g-2">
<div class="col-md-3">
<select class="form-select" name="goods_id">
{% for g in goods %}<option value="{{g.id}}">{{g.name}}</option>{% endfor %}
</select>
</div>
<div class="col-md-2">
<select class="form-select" name="from_wareid">
{% for w in wares %}<option value="{{w.id}}">{{w.name}}</option>{% endfor %}
</select>
</div>
<div class="col-md-2">
<select class="form-select" name="to_wareid">
{% for w in wares %}<option value="{{w.id}}">{{w.name}}</option>{% endfor %}
</select>
</div>
<div class="col-md-2"><input class="form-control" name="num" placeholder="数量"></div>
<div class="col-md-3"><button class="btn btn-primary">调拨</button></div>
</form>
</div>
<table class="table">
{% for t in records %}
<tr>
<td>{{t.goods.name}}</td>
<td>{{t.from_ware.name}} → {{t.to_ware.name}}</td>
<td>{{t.num}}</td>
<td>{{t.create_time}}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
