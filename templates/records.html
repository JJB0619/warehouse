<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>记录</title>
<style>
body{padding:20px;background:#f5f5f5}
table{border-collapse:collapse;background:white;width:100%}
td,th{border:1px solid #ccc;padding:8px}
</style>
</head>
<body>
<h2>出入库记录 & 按日统计</h2>
<a href="/">返回</a>
<form>
<input type="date" name="date" value="{{ date }}">
<button>查询</button>
</form>
<table>
<tr><th>时间</th><th>类型</th><th>商品</th><th>位置</th><th>数量</th><th>操作人</th></tr>
{% for r in records %}
<tr>
<td>{{ r[6] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[8] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>
<td>{{ r[5] }}</td>
</tr>
{% endfor %}
</table>
</body></html>
