<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>商品管理</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-title">菜单</div>
      <div class="sidebar-menu">
        <a href="/index">控制台</a>
        <a href="/products" class="active">商品管理</a>
        <a href="/stock">出入库管理</a>
        <a href="/transfer">仓库调拨</a>
        <a href="/warning">库存预警</a>
        <a href="/report">报表导出</a>
        <a href="/users">用户管理</a>
        <a href="javascript:logout()">退出</a>
      </div>
    </div>

    <div class="content">
      <div class="page-title">商品管理</div>
      <div class="form-row">
        <input id="pname" placeholder="商品名称">
        <input id="pspec" placeholder="规格">
        <select id="warehouse_id"></select>
        <button class="btn-primary" onclick="addProduct()">添加商品</button>
      </div>
      <table class="table" id="productTable"></table>
    </div>
  </div>
  <script src="/static/js/main.js"></script>
</body>
</html>
