<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>登录</title>
<style>
body{text-align:center;padding-top:100px;background:#f5f5f5}
.login{background:white;padding:40px;width:300px;margin:0 auto;border-radius:10px}
input{width:100%;padding:10px;margin:10px 0}
button{padding:10px 20px;background:#007bff;color:white;border:none;border-radius:5px}
</style>
</head>
<body>
<div class="login">
<h2>仓库管理系统</h2>
<form method="post">
<input name="username" placeholder="账号" required>
<input name="password" type="password" placeholder="密码" required>
<button>登录</button>
</form>
</div>
</body></html>
