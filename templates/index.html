<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>主页</title>
<style>
body{padding:20px;font-family:微软雅黑;background:#f5f5f5}
.menu{margin-bottom:20px}
.menu a{margin-right:15px;color:#007bff}
.box{background:white;padding:15px;border-radius:8px;margin-bottom:15px}
table{width:100%;border-collapse:collapse;background:white}
table,td,th{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#eee}
</style>
</head>
<body>
<h2>总控制台</h2>
<div class="menu">
<a href="/">主页</a>
<a href="/transfer">调拨</a>
<a href="/records">记录</a>
<a href="/report">报表</a>
<a href="/user">用户管理</a>
<a href="/logout">退出</a>
</div>

<div class="box">
<h3>自动统计</h3>
大厅总库存：{{ total_hall }} &nbsp;&nbsp;
二楼总库存：{{ total_f2 }} &nbsp;&nbsp;
三楼总库存：{{ total_f3 }} &nbsp;&nbsp;
总库存：{{ total_all }}
</div>

<div class="box">
<h3>新增商品</h3>
<form method="post" action="/add_product">
<input name="name" placeholder="商品名" required>
<input name="model" placeholder="型号">
<input name="remark" placeholder="备注">
<button>添加</button>
</form>
</div>

<div class="box">
<h3>库存列表</h3>
<table>
<tr><th>ID</th><th>商品</th><th>型号</th><th>大厅</th><th>二楼</th><th>三楼</th><th>入库</th><th>出库</th></tr>
{% for p in products %}
<tr>
<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ stock[p[0]][0] }}</td>
<td>{{ stock[p[0]][1] }}</td>
<td>{{ stock[p[0]][2] }}</td>
<td>
<form method="post" action="/stock_in" style="display:inline">
<input type="hidden" name="pid" value="{{ p[0] }}">
<select name="loc">
<option value="hall">大厅</option>
<option value="f2">二楼</option>
<option value="f3">三楼</option>
</select>
<input type="number" name="num" value="1" min="1" style="width:50px">
<input name="remark" placeholder="备注" style="width:60px">
<button>入库</button>
</form>
</td>
<td>
<form method="post" action="/stock_out" style="display:inline">
<input type="hidden" name="pid" value="{{ p[0] }}">
<select name="loc">
<option value="hall">大厅</option>
<option value="f2">二楼</option>
<option value="f3">三楼</option>
</select>
<input type="number" name="num" value="1" min="1" style="width:50px">
<input name="remark" placeholder="备注" style="width:60px">
<button>出库</button>
</form>
</td>
</tr>
{% endfor %}
</table>
</div>
</body></html>
