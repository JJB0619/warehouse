{% extends "base.html" %}
{% block content %}
<h5>控制台</h5><hr>
<div class="row g-3">
<div class="col-6 col-md-3"><div class="card p-3 text-center bg-primary text-white">商品<br><h3>{{goods_count}}</h3></div></div>
<div class="col-6 col-md-3"><div class="card p-3 text-center bg-success text-white">仓库<br><h3>{{ware_count}}</h3></div></div>
<div class="col-6 col-md-3"><div class="card p-3 text-center bg-danger text-white">预警<br><h3>{{warn_count}}</h3></div></div>
<div class="col-6 col-md-3"><div class="card p-3 text-center bg-warning text-dark">利润<br><h3>{{profit_total}}</h3></div></div>
</div>
<div class="row mt-3 g-3">
<div class="col-md-3"><div class="card p-3">总成本<br><h4>{{total_cost}}</h4></div></div>
<div class="col-md-3"><div class="card p-3">总销售额<br><h4>{{sale_total}}</h4></div></div>
<div class="col-md-3"><div class="card p-3">总入库<br><h4>{{in_total}}</h4></div></div>
<div class="col-md-3"><div class="card p-3">总出库<br><h4>{{out_total}}</h4></div></div>
</div>
{% endblock %}
